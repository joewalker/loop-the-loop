prompt: |
  Please fix bug joewalker/loop-the-loop#34

  Title: loadCliConfig: a relative 'outputDir' in the config file is resolved against process.cwd(), inconsistent with the default which resolves to the config file directory
  URL: https://github.com/joewalker/loop-the-loop/issues/34
  Labels: bug, S3

  ## Observed behavior

  When `outputDir` is omitted from a CLI config file, `normalizeCliConfig` defaults it to the directory of the config file (an absolute path). When `outputDir` is supplied but as a *relative* path, the value is passed through unchanged and is later interpreted by the reporters and `loop()` relative to `process.cwd()`.

  Source: [src/util/load-cli-config.ts:103-110](src/util/load-cli-config.ts#L103-L110)

  ```ts
  return {
    ...config,
    ...(config.outputDir === undefined ? { outputDir: configDir } : {}),
    agent: await normalizeAgentSpec(config.agent, configDir),
    promptGenerator: normalizePromptGeneratorSpec(config.promptGenerator, {
      configDir,
    }),
  };
  ```

  Downstream usage in [src/reporters/yaml.ts:19-20](src/reporters/yaml.ts#L19-L20) and [src/reporters/jsonl.ts:19-20](src/reporters/jsonl.ts#L19-L20) calls `mkdir(config.outputDir, ...)` and `join(config.outputDir, ...)` directly, so a relative `outputDir` resolves against the current working directory rather than the config file directory.

  This is inconsistent with the rest of the loader, which goes to some effort to resolve paths (prompt template includes, claude-sdk systemPrompt includes, prompt generator basePaths) relative to the config file. The JSON schema [documents](schema/loop-the-loop.schema.json#L19-L22) only the default ("Defaults to the config file directory when loaded via the CLI") but does not specify what a relative `outputDir` means.

  ## Expected behavior

  A relative `outputDir` in the config file should resolve to the same base as the default, i.e. the config file directory. Users naturally expect that:

  ```json
  { "outputDir": "reports" }
  ```

  in `/some/where/config.json` writes to `/some/where/reports`, not to `${cwd}/reports`.

  Equivalently, the documentation should be updated and the loader should error on relative `outputDir` values, but resolving against `configDir` is the lower-friction fix and matches the existing path-handling convention for the rest of the config.

  ## Minimal reproduction

  ```sh
  mkdir -p /tmp/llt-repro/conf
  cat > /tmp/llt-repro/conf/config.json <<'JSON'
  {
    "name": "demo",
    "outputDir": "reports",
    "agent": "test",
    "promptGenerator": ["test", { "prompts": ["hi"] }]
  }
  JSON

  mkdir -p /tmp/llt-repro/elsewhere
  cd /tmp/llt-repro/elsewhere
  pnpx loop-the-loop /tmp/llt-repro/conf/config.json
  # Writes report into /tmp/llt-repro/elsewhere/reports (cwd-relative),
  # not /tmp/llt-repro/conf/reports (config-file-relative).
  ```

  ## Suggested fix

  In `normalizeCliConfig`:

  ```ts
  const outputDir =
    config.outputDir === undefined
      ? configDir
      : resolve(configDir, config.outputDir);

  return {
    ...config,
    outputDir,
    agent: await normalizeAgentSpec(config.agent, configDir),
    promptGenerator: normalizePromptGeneratorSpec(config.promptGenerator, {
      configDir,
    }),
  };
  ```

  `resolve()` is a no-op for already-absolute paths, so the existing "preserve an explicit outputDir" test (which uses an absolute path) keeps working. A new test should cover the relative case.


  If you discover a problem which prevents you from fixing the bug, comment using the `gh` command.

  When you have finished, update chat with your progress.

  Finally report on the tools that you would have liked to have used in this investigation, but that you didn't have access to.

output: |
