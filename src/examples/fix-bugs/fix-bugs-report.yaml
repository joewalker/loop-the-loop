  Please fix bug joewalker/loop-the-loop#8

  Title: claude-sdk: token-limit / glitch heuristic is case-sensitive and inconsistent with codex-cli
  URL: https://github.com/joewalker/loop-the-loop/issues/8
  Labels: bug, S3

  ## Observed behavior

  `ClaudeSDKAgent.#isTokenLimitError` classifies a failure as a `glitch` (rather than a fatal `error`) using:

  ```ts
  #isTokenLimitError(text: string): boolean {
    // TODO: This is a bit wooly. Is there a error id associated with this?
    return (
      text.includes('token') ||
      text.includes('rate_limit') ||
      text.includes('quota')
    );
  }
  ```

  Two problems:

  1. The substring checks are case-sensitive. SDK / API error text often uses capitalised words like `"Rate Limit"`, `"Token"`, `"Quota"`, or HTTP status text. A real rate-limit error whose reason reads `"HTTP 429: Rate limit exceeded"` would not be detected as a glitch, so the loop would abort instead of recording a transient failure.
  2. The substring `"token"` is broad enough to match many unrelated errors that contain "token" (e.g. auth tokens, "tokenizer", JSON parser messages). Those non-transient errors would be misclassified as glitches and the loop would keep retrying.

  The `codex-cli` agent (`src/agents/codex-cli.ts`, `isTokenLimitError`) does this more carefully: it lowercases first and additionally checks `"rate limit"`, `"429"`, etc.

  The behaviour matters because, per `src/loop.ts`, a `glitch` keeps the loop running (up to `MAX_CONSECUTIVE_GLITCHES`) while an `error` aborts immediately. Misclassification leads to either spurious aborts on real rate limits or pointless retries on real prompt errors.

  ## Expected behavior

  `#isTokenLimitError` should:

  - Compare case-insensitively (lowercase the input once).
  - Cover at least the same vocabulary as `codex-cli` (`token`, `rate_limit`, `rate limit`, `quota`, `429`).
  - Ideally prefer matching SDK-provided structured fields (`subtype`, `terminal_reason`, `errors[]`) over substring sniffing.

  ## Minimal reproduction

  Mock a result with `reason` set to `"HTTP 429: Rate limit exceeded"` and observe that `#isTokenLimitError` returns `false`, so the invocation reports `status: 'error'` and the loop aborts after a single occurrence rather than tolerating up to `MAX_CONSECUTIVE_GLITCHES`.

  ## Suggested fix

  ```ts
  #isTokenLimitError(text: string): boolean {
    const lower = text.toLowerCase();
    return (
      lower.includes('token') ||
      lower.includes('rate_limit') ||
      lower.includes('rate limit') ||
      lower.includes('quota') ||
      lower.includes('429')
    );
  }
  ```

  Better still, branch on the SDK's structured failure shapes (`error_max_budget_usd`, `terminal_reason === 'blocking_limit' | 'rapid_refill_breaker'`, etc.) before falling back to substring matching.

  File: `src/agents/claude-sdk.ts` (lines 214-221).


