prompt: |
  Please fix bug joewalker/loop-the-loop#15

  Title: codex-cli: no timeout or kill mechanism, so a hung Codex blocks the loop indefinitely
  URL: https://github.com/joewalker/loop-the-loop/issues/15
  Labels: bug, S3

  ## Observed behavior

  `runCodex` in `src/agents/codex-cli.ts` spawns the `codex` CLI and waits for either a `close` or `error` event before resolving:

  ```ts
  return new Promise(resolve => {
    const child = spawn('codex', [...args], {
      stdio: ['ignore', 'pipe', 'pipe'],
    });
    ...
    child.on('error', error => {
      finish(output.toResult(null, null, error));
    });
    child.on('close', (code, signal) => {
      finish(output.toResult(code, signal));
    });
  });
  ```

  There is no timeout, no `signal` plumbing, and no exposed way for the caller to abort the invocation. If `codex` hangs (which historically motivated the still-open description in #2, "It currently gets stuck shortly after take-off"), `agent.invoke` never resolves, the `loop(...)` promise stays pending forever, and the process effectively wedges.

  The Claude SDK agent has different failure modes (the SDK iterator can detect `error_max_turns` and similar terminal subtypes), so the loop's higher-level glitch handling only protects against repeated *resolved* failures, not against a single hung child process.

  ## Expected behavior

  `runCodex` should either:

  1. Honour an `AbortSignal` passed through `InvokeOptions` so the loop (or a test) can cancel a hanging invocation.
  2. Apply a configurable per-invocation timeout (e.g. `codexTimeoutMs` on `CodexCLIAgent`'s creator) that, when exceeded, sends `SIGTERM` then `SIGKILL` and returns `status: 'glitch'` with a clear reason.

  The current behaviour (no recovery without external intervention) is unsafe for unattended runs.

  ## Minimal reproduction

  A faithful unit-test repro using the existing test doubles:

  ```ts
  const child = new FakeChildProcess();
  spawnMock.mockReturnValue(child);

  const resultPromise = new CodexCLIAgent().invoke('do the thing', {
    logger: createLogger(false),
  });

  // Never emit 'close' or 'error' on the child.
  // resultPromise stays pending indefinitely.
  ```

  In the real CLI, this manifests when Codex enters a state where it stops emitting JSONL events and never exits (for example a network stall during a long tool call).

  ## Suggested fix

  Add an `AbortSignal`-aware path and an explicit timeout. Sketch:

  ```ts
  const controller = new AbortController();
  const timer = setTimeout(() => {
    controller.abort(new Error(`Codex timed out after ${timeoutMs}ms`));
    child.kill('SIGTERM');
  }, timeoutMs);

  controller.signal.addEventListener('abort', () => {
    child.kill('SIGTERM');
    setTimeout(() => child.kill('SIGKILL'), 5_000).unref();
  });
  ```

  with `clearTimeout(timer)` inside `finish(...)`. The error returned should be classified as `glitch` so the loop continues to the next prompt rather than aborting.

  File: `src/agents/codex-cli.ts` (`runCodex`).


