  The bug is fixed. I followed Red/Green TDD:

  1. Read `src/loggers.ts` and identified the bug in `VerboseLogger.#log`: it called `console.error(styleText(color, ...))` with default `styleText` options that validate `process.stdout`, while the actual write target is `process.stderr`.

  2. Updated `src/__test__/loggers.test.ts`: the three existing tests now pass `{ stream: process.stderr }` to `styleText` in their expectations (matching the contract), and I added two new tests that force divergent `process.stdout.isTTY` / `process.stderr.isTTY` values to exercise the actual bug:
     - `command > out.log` (stdout false, stderr true) keeps ANSI codes
     - `command 2> err.log` (stdout true, stderr false) strips color
     Both tests reset `isTTY` in `afterEach` so they don't pollute other tests.

  3. The new tests failed against the original code (Red), confirming the bug.

  4. Fixed `VerboseLogger.#log` by passing `{ stream: process.stderr }` to `styleText`. All 9 logger tests pass (Green), plus the full suite (`pnpm tsc && pnpm test`: 385 passed, 5 skipped), and `pnpm lint` / `pnpm format` are clean.

