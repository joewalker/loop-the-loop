  Please fix bug joewalker/loop-the-loop#29

  Title: examples/review.ts: /review slash command is not processed by either agent in headless mode, so the example does not actually trigger a review
  URL: https://github.com/joewalker/loop-the-loop/issues/29
  Labels: bug, S3

  ## Observed behavior

  `src/examples/review.ts` wires up the `codex-cli` agent (with `claude-sdk` mentioned in a `// or` comment) and uses the per-file prompt generator with:

  ```ts
  promptTemplate: '/review {{file}}',
  ```

  After `{{file}}` expansion, the actual user message handed to the agent looks like `/review src/agents/codex-cli.ts`. The example clearly intends this to invoke the built-in `/review` slash command that Claude Code and Codex expose interactively. But neither of the agents shipped in this repo processes slash commands in headless mode:

  - `src/agents/codex-cli.ts` calls `codex exec` and passes the prompt as a positional argument (`args.push(prompt)`). `codex exec` does not parse slash commands; it sends the literal text `/review src/foo.ts` to the model as the user turn. The `--sandbox read-only` flag means the model could not invoke `/review`'s normal file-editing side effects even if it tried.
  - `src/agents/claude-sdk.ts` calls `query({ prompt, options })` from `@anthropic-ai/claude-agent-sdk@0.3.142`. The SDK's `initialPrompt` field is documented as "Auto-submitted as the first user turn when this agent is the main thread agent. Slash commands are processed." The `query({ prompt: ... })` we use is not `initialPrompt`, and the default tool set is `['Read', 'Glob', 'Grep']` (`DEFAULT_TOOLS` in `claude-sdk.ts`) which does not include the `SlashCommand` tool. There is no project-level slash command at `.claude/commands/review.md` either.

  The net effect is that the agent receives a one-line user message of the form "/review src/foo.ts" with no system prompt, no review checklist, no `outputSchema`, and no guidance about what to look for. What comes back is whatever the underlying model decides to do with that string, which empirically ranges from "I will review this file" (followed by a free-form ad-libbed review) to "I do not know what /review means". For a workflow explicitly named `review`, that is a coin toss.

  ## Expected behavior

  The example should produce a structured review without depending on slash command preprocessing that neither agent performs. The companion `src/examples/quality-check/quality-check.json` already shows the right pattern:

  ```json
  "promptTemplate": "{{include:prompt.md}}",
  "filePattern": "src/**/*.ts",
  "excludePatterns": ["**/__test__/**", "**/*.test.ts", "**/examples/**"]
  ```

  with an accompanying `prompt.md` that spells out what the agent should look for, how to classify severities, and where to file issues.

  `review.ts` should similarly inline a real review prompt (either directly in the template string or via `{{include:./review-prompt.md}}`) rather than relying on `/review` as a magic command.

  ## Minimal reproduction

  ```sh
  pnpm tsc
  node dist/examples/review.js
  ```

  Observe in the verbose log (or just the report) that the agent received the literal text `/review <path>` and produced output that is not a structured code review.

  For a side-by-side comparison run `node dist/cli.js src/examples/quality-check/quality-check.json --maxPrompts 1 --verbose` and compare the report quality.

  ## Severity

  S3. The library itself works correctly; the bug is in the bundled example. But this is the file the README points new users at first when they want to try "loop over files and run a review", so it teaches a pattern that will not give them a real review.

  ## Possible fix

  Replace the prompt template with a real review prompt. The smallest change is something like:

  ```ts
  promptTemplate: [
    'Review {{file}} for bugs, security issues, and maintainability problems.',
    'Take care to understand the full context of the codebase before reporting.',
    'Report findings as a short list. Do not modify the file.',
  ].join('\n\n'),
  ```

  A nicer fix would be to add a `review.md` next to `review.ts` and use `{{include:./review.md}}`, mirroring the `quality-check` example.



  If you discover a problem which prevents you from fixing the bug, comment using the `gh` command.

  When you have finished, commit a fix for the bug including a "Fixes #joewalker/loop-the-loop#29" comment and update chat with your progress.

  Finally report on the tools that you would have liked to have used in this investigation, but that you didn't have access to.

output: |
  Fix committed as `4e3193d`.

  ## Summary

  The bug was in `src/examples/review.ts`. The `promptTemplate` was `'/review {{file}}'`, which would only work if some part of the pipeline interpreted `/review` as a slash command. None of the bundled agents do that in headless mode:

  - `codex-cli` calls `codex exec`, which forwards the prompt as a literal user turn and does not parse slash commands.
  - `claude-sdk` calls `query({ prompt })`, not the SDK's `initialPrompt` field (the only path documented to process slash commands), and the default tool set does not include `SlashCommand`. There is no `.claude/commands/review.md` either.

  The fix replaces the template with a real, inline review prompt asking the agent to look for bugs, security issues, and maintainability problems, with instructions not to modify the file. This mirrors the working pattern shown in `src/examples/quality-check/`.

  I went with the smallest fix from the bug's "Possible fix" section (inline template) rather than a separate `review.md` because `review.ts` is a standalone programmatic example, kept deliberately compact, so an external prompt file would be more ceremony than the example warrants.

  Verification:
  - `pnpm tsc` passes
  - `pnpm test` 325 passed, 5 skipped
  - `pnpm lint` 0 warnings, 0 errors
  - `pnpm format` clean

  ## Tools I would have liked to have

  - A tool that can dispatch an example end-to-end against a mock agent and assert on the prompt actually received by the agent. The bug report's "minimal reproduction" requires running a real model, which is exactly the kind of thing I cannot do from this sandbox. A wired-in mock agent or recording reporter would let me confirm the agent now sees the structured review prompt, rather than relying on visual inspection of the template string.
  - A tool that follows GitHub issue references in commit messages and verifies the issue closes correctly (`Fixes #joewalker/loop-the-loop#29` is the convention the bug asked for, but I cannot tell from here whether GitHub will actually resolve that to issue 29 once pushed; a normal `Fixes #29` is what GitHub recognises within the same repo, but I followed the explicit instruction in the bug).
  - `gh issue view 29` for cross-checking the issue text against my fix in one step. I could have run it (it is whitelisted), but doing so would have been redundant since the full bug body was already provided in the user message.
