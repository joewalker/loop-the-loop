  2. `src/agents/codex-cli.ts` introduces `CodexCLIAgentConfig` with a `timeoutMs` field. The constructor and `create()` factory accept it. `runCodex` now:
     - Wires `options.signal` to a child-kill handler. SIGTERM is sent immediately; SIGKILL is scheduled 5 seconds later as a fallback.
