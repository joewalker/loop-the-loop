id: 'joewalker/loop-the-loop#14'
status: success
prompt: |
  Please fix bug joewalker/loop-the-loop#14

  Title: codex-cli: isTokenLimitError matches assistant output, misclassifying real errors as glitches
  URL: https://github.com/joewalker/loop-the-loop/issues/14
  Labels: bug, S3

  ## Observed behavior

  When the Codex process exits non-zero, `CodexCLIAgent.invoke` (`src/agents/codex-cli.ts`) builds the failure reason by concatenating the process error metadata with the assistant's last partial message read from the `--output-last-message` file:

  ```ts
  const output = await safeReadOutput(outputPath);
  const baseError = buildExecErrorText(codexResult);
  const errorText = (output ? `${baseError}\n${output}` : baseError).trim();

  const reason =
    errorText || 'Codex invocation failed with no error output';
  const status = isTokenLimitError(reason) ? 'glitch' : 'error';
  return { status, reason };
  ```

  `isTokenLimitError` is a substring check:

  ```ts
  function isTokenLimitError(text: string): boolean {
    const lower = text.toLowerCase();
    return (
      lower.includes('token') ||
      lower.includes('rate_limit') ||
      lower.includes('rate limit') ||
      lower.includes('quota') ||
      lower.includes('429')
    );
  }
  ```

  Two problems follow from feeding the assistant's response into this check:

  1. Any prompt that elicits the word "token" (JWTs, tokenisers, OAuth tokens, BPE tokens, etc.) will cause a real, prompt-specific failure to be classified as a `glitch`. Per `src/loop.ts`, glitches are tolerated up to `MAX_CONSECUTIVE_GLITCHES = 5`, so the loop will retry a deterministic failure several times before giving up, and may also "absorb" the bad prompt's error by treating the next success as cancelling out the glitch counter.

  2. The substring `'token'` is broad enough to match unrelated terminology even in the process metadata itself (e.g. a stack trace mentioning `tokenize`, an auth library error, etc.). This can also cause non-transient errors to be classified as glitches.

  The narrower, more transient-specific substrings (`rate_limit`, `rate limit`, `429`, `quota`) are useful and unlikely to false-match, but they should be checked against process metadata only, not against arbitrary assistant text.

  ## Expected behavior

  The transient-versus-fatal classification should be made from the process exit metadata (`stderr`, exit code, possibly Codex JSONL events like `error` items) without consulting the assistant's output text. Concretely:

  - Build `reason` from `baseError` and `output` for human display.
  - Run the classifier only over `baseError` (or, better, dedicated structured fields), not over the assistant body.
  - Consider tightening the `'token'` check to e.g. `'tokens remaining'`, `'token limit'`, `'token quota'`, or `'context window'`, since the bare word alone produces many false positives.

  ## Minimal reproduction

  1. Configure the loop with a prompt such as "Explain how OAuth tokens work."
  2. Force Codex to fail (e.g. revoke the API key, or use a prompt large enough to exceed the model's context window) so it exits non-zero while the `--output-last-message` file still contains the partial assistant response (which references "tokens").
  3. Observe that `agent.invoke` returns `{ status: 'glitch', reason: '... tokens ...' }`. The loop then retries the same prompt up to five times in a row before aborting.

  ## Suggested fix

  Separate the textual classification source from the user-facing reason. For example:

  ```ts
  const baseError = buildExecErrorText(codexResult);
  const output = await safeReadOutput(outputPath);
  const reason = (output ? `${baseError}\n${output}` : baseError).trim()
    || 'Codex invocation failed with no error output';

  const status = isTokenLimitError(baseError) ? 'glitch' : 'error';
  return { status, reason };
  ```

  This keeps the diagnostic output rich while removing the assistant body from the classifier.

  File: `src/agents/codex-cli.ts` (`invoke`, lines 61-68; `isTokenLimitError`).


  If you discover a problem which prevents you from fixing the bug, comment using the `gh` command.

  When you have finished, commit a fix for the bug including a "Fixes joewalker/loop-the-loop#14" comment and update chat with your progress.

  Finally report on the tools that you would have liked to have used in this investigation, but that you didn't have access to. Give me the exact line to add to `allowedTools` and why it's important.

output: |
  Fix committed as `97a4f2f`. Here's a summary of what changed.

  Summary of progress

  The bug was in `src/agents/codex-cli.ts`. When the Codex process exited non-zero, `CodexCLIAgent.invoke` concatenated the process error metadata with the assistant's partial response from `--output-last-message` and then ran `isTokenLimitError` over that whole blob. Because the classifier did a bare substring check for `'token'`, any prompt that elicited the word "token" (OAuth, JWTs, BPE tokens, etc.) was misclassified as a transient `glitch` and retried up to `MAX_CONSECUTIVE_GLITCHES` times.

  The fix has two parts. First, the user-facing `reason` is still built from `baseError` plus the assistant body, but the classifier now runs over `baseError` only, so the assistant text can never influence classification. Second, I tightened `isTokenLimitError` so the bare word `token` is no longer enough to trip a glitch verdict. It now requires `tokens remaining`, `token limit`, `token quota`, or `context window`, alongside the existing `rate_limit` / `rate limit` / `quota` / `429` checks (those are narrow enough already).

  I wrote four new tests first, watched them fail (red), and then made them pass (green): one covers the original bug where the assistant body mentions tokens but stderr does not, two cover legitimate transient classifications from stderr (`429` and `context window` and `token limit`), and one covers the previous false positive where stderr says "failed to tokenize input". All 357 tests pass; `pnpm tsc`, `pnpm lint`, and `pnpm format` are clean.

  Tooling gap

  There was one tool I would have liked but did not have: the ability to inspect the issue body directly without copy-pasting. The user provided the issue body in the prompt, but if I had needed to fetch it myself I would have used `gh issue view`. I do not have it on my allowed list.

  Suggested allowlist line:

  ```
  Bash(gh issue view:*)
  ```

  Why it matters: `gh issue view <num>` (with optional `--json body,title,labels`) is the canonical way to pull a Github issue's full content from the terminal, and the project's own `AGENTS.md` directs agents to use `gh` for bug tracking. With it on the allowlist I could verify the issue body, check labels (e.g. confirm `S3`), and read any follow-up comments without needing the user to paste them, which keeps the agent self-sufficient on any bug-fix task that starts from just an issue number/URL.
