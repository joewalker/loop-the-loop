  Please fix bug joewalker/loop-the-loop#6

  Title: claude-sdk: SDK error 'errors' array is dropped from the failure reason
  URL: https://github.com/joewalker/loop-the-loop/issues/6
  Labels: bug, S3

  ## Observed behavior

  When the Claude Agent SDK returns a non-success `result` message (subtype `error_during_execution`, `error_max_budget_usd`, `error_max_structured_output_retries`, etc.), `ClaudeSDKAgent.invoke` constructs the failure reason in `#describeResultError`:

  ```ts
  if (typeof resultMsg['error'] === 'string' && resultMsg['error']) {
    parts.push(`error=${resultMsg['error']}`);
  }
  if (typeof resultMsg['message'] === 'string' && resultMsg['message']) {
    parts.push(`message=${resultMsg['message']}`);
  }
  ```

  It looks for `error` (string) and `message` fields on the result message. Per the SDK type declarations (`@anthropic-ai/claude-agent-sdk/sdk.d.ts`), `SDKResultError` carries the diagnostic text in `errors: string[]` and does not define an `error` or `message` field. The actual error strings the SDK provides are never extracted, so the loop sees something like:

  ```
  Agent invocation failed (subtype=error_during_execution)
  ```

  with no clue what actually went wrong.

  ## Expected behavior

  The failure reason should include the strings from `SDKResultError.errors` (joined or otherwise formatted) so callers can diagnose what failed. Optionally `terminal_reason` and `stop_reason` could be surfaced too.

  ## Minimal reproduction

  1. Configure a `claude-sdk` agent and trigger any condition that the SDK reports as `error_during_execution` (e.g. force an MCP failure or hand it a malformed `outputSchema`).
  2. Observe the `InvokeResult.reason` returned to the loop. It contains only `subtype=...` with no SDK-supplied detail.

  ## Suggested fix

  In `#describeResultError`:

  ```ts
  const errors = resultMsg['errors'];
  if (Array.isArray(errors) && errors.length > 0) {
    parts.push(`errors=${errors.filter(e => typeof e === 'string').join('; ')}`);
  }
  ```

  and drop the now-dead `error` / `message` reads (or keep them as a defensive fallback).

  File: `src/agents/claude-sdk.ts` (`#describeResultError`, around lines 185-197).


