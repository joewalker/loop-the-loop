  Title: loop: --maxPrompts=0 still processes one prompt before bailing out
  URL: https://github.com/joewalker/loop-the-loop/issues/22
  Labels: bug, S3

  ## Observed behavior

  `parseArgs` explicitly accepts `--maxPrompts=0` (there is a dedicated test `parses --maxPrompts=0 (allow zero)` in `src/util/__test__/load-cli-config.test.ts`), and `loop()` forwards that value through to `loopImpl` unchanged (the `?? Infinity` fallback only fires for `null`/`undefined`, not for `0`).

  Inside `loopImpl` in `src/loop.ts`, the limit check is placed at the end of the for-await body:

  ```ts
  for await (const prompt of promptGenerator.generate(loopState)) {
    await loopState.begin(prompt.id);
    const result = await agent.invoke(prompt.prompt, { ... });
    await reporter.append(prompt, result);
    await loopState.end(prompt.id, result);
    // ... success/glitch/error handling ...
    completed++;
    if (completed >= maxPrompts) {
      return `Done (reached limit of ${maxPrompts} prompts)`;
    }
    // ...
  }
  ```

  When `maxPrompts === 0` and the generator yields at least one prompt, the first prompt is fully processed (`loopState.begin`, an `agent.invoke` round trip, `reporter.append`, `loopState.end`, and any success-path git commit) before `1 >= 0` triggers the bail-out. The CLI then prints `Done (reached limit of 0 prompts)` even though one prompt has already been consumed and reported on.

  ## Expected behavior

  `--maxPrompts=0` should cap the loop at zero prompts. Either no prompt should be invoked on the agent at all (preferred, matching the natural reading of "max 0 prompts"), or the value should be rejected at parse time. Today the loop happily spends an agent invocation, writes to the report file, and advances loop state for a single prompt despite the user asking for zero.

  ## Minimal reproduction

  1. Create a config that selects any agent with at least one prompt (e.g. the `test` prompt generator with one prompt).
  2. Run `loop-the-loop --maxPrompts=0 config.json`.
  3. Observe that the agent is invoked once, the reporter receives an entry, and the loop state file is updated, before `Done (reached limit of 0 prompts)` is printed.

  A pure unit-level repro would call `loop({ ..., maxPrompts: 0, promptGenerator: <generator yielding one prompt> })` and assert that the agent's `invoke` is never called; today it is called once.

  ## Suggested fix

  Short-circuit before entering the for-await loop, for example:

  ```ts
  if (maxPrompts <= 0) {
    return `Done (reached limit of ${maxPrompts} prompts)`;
  }
  ```

  Or, equivalently, check `if (completed >= maxPrompts) break;` at the top of the loop body instead of at the bottom. Add a regression test in `src/__test__/loop.test.ts` that calls `loop` with `maxPrompts: 0` and a non-empty generator, and asserts the agent's `invoke` was not called.


