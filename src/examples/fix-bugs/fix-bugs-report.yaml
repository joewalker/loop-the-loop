prompt: |
  Please fix bug joewalker/loop-the-loop#11

  Title: claude-sdk: allowedTools doubles as the load list, silently disabling all built-in tools when empty
  URL: https://github.com/joewalker/loop-the-loop/issues/11
  Labels: bug, S3

  ## Observed behavior

  ClaudeSDKAgent threads the user-supplied allowedTools list through splitAllowedTools to derive two SDK options. The bare names are sent to the SDK's `tools` option, which the SDK documents as:

      tools?: string[] | { type: 'preset'; preset: 'claude_code' };

  with the explicit semantics:

      - `string[]` - Array of specific tool names (e.g., ['Bash', 'Read', 'Edit'])
      - `[]` (empty array) - Disable all built-in tools
      - `{ type: 'preset'; preset: 'claude_code' }` - Use all default Claude Code tools

  This means an InvokeOptions.allowedTools value of [] (a documented signal "do not auto-approve anything") is translated by splitAllowedTools into:

      { tools: [], allowedTools: [] }

  and then passed to the SDK, which interprets `tools: []` as "disable all built-in tools". The agent silently loses every built-in tool, even tools the user might expect to remain available (the Claude Code preset).

  This is partially documented in splitAllowedTools' JSDoc, but the InvokeOptions/LoopCliConfig type only documents allowedTools as the auto-approval list:

      Tool names that should be auto-allowed without prompting for
      permission. When omitted the agent falls back to its own defaults.

  There is no mention that supplying an empty list switches off every built-in tool.

  A related concern: when allowedTools is omitted entirely, the agent falls back to DEFAULT_TOOLS = ['Read', 'Glob', 'Grep'] and only loads those three tools. The Claude Code preset (which most SDK consumers default to) is never available.

  The current live test (`claude-sdk-live.test.ts`) happens to pass because the cheap arithmetic prompt does not actually need any tools.

  ## Expected behavior

  One of:

  1. Treat allowedTools as auto-approval only: do not pass `tools` to the SDK at all (use the preset), unless the user explicitly opts into a load-list. This matches the documented InvokeOptions semantics.
  2. Add an explicit `tools` option to ClaudeSDKAgentConfig / InvokeOptions so the load list and the auto-approval list are independent, and document the empty-list special case.

  Either way, the InvokeOptions documentation should mention that an empty list does not simply mean "no auto-approval".

  ## Minimal reproduction

  Invoke a claude-sdk agent with allowedTools: ['Bash(gh issue create *)']. The bare name "Bash" is extracted and passed as `tools: ['Bash']`. Read, Edit, Grep, Glob, WebFetch, MCP-provided tools, etc., are all unavailable to the model. With allowedTools: [], no tools at all are available.

  ## Suggested fix

  Option (1) above is the smallest change: only pass the SDK `tools` option when explicitly configured (e.g. add a separate `loadedTools` config or default to the Claude Code preset). At minimum, document the current behaviour on the InvokeOptions / LoopCliConfig allowedTools field so callers are not surprised.

  File: src/agents/claude-sdk.ts (splitAllowedTools and invoke).



