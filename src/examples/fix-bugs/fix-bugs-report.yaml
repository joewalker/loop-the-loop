  Please fix bug joewalker/loop-the-loop#26

  Title: examples/bugzilla-retriage: agent has no tools to answer the triage questions it is asked
  URL: https://github.com/joewalker/loop-the-loop/issues/26
  Labels: bug, S3

  ## Observed behavior

  `src/examples/bugzilla-retriage.ts` (and the sibling `bugzilla-retriage.json`) wire up the `claude-sdk` agent against a Bugzilla feed of old DOM Workers bugs and ask the agent to produce a triage verdict. The prompt asks four substantive questions:

  > - Has the area of code this bug relates to been significantly refactored or removed?
  > - Is the described behavior still reproducible in modern Firefox?
  > - Has a duplicate or related bug already fixed the underlying issue?
  > - Is the bug about a feature or API that has been deprecated or replaced?

  None of these can be answered from `id`, `summary`, `component`, `product`, `severity`, `status`, `assignee`, `url` alone, which is all the prompt expands.

  The example does not configure `allowedTools`, `disallowedTools`, `mcpServers`, or `outputSchema`. With nothing supplied, `ClaudeSDKAgent` falls back to `DEFAULT_TOOLS = ['Read', 'Glob', 'Grep']` (see `src/agents/claude-sdk.ts`). Those three tools only see the user's current working directory (which is whatever shell the example is launched from, typically the loop-the-loop checkout, not a Firefox tree), and they cannot reach Bugzilla, the web, mozilla-central, or any other source of ground truth.

  The net effect is that the agent has no way to gather any evidence and must produce its `VERDICT` / `CONFIDENCE` / `REASON` from training-data recall plus the bug summary string. For old, narrowly scoped DOM Workers bugs this is overwhelmingly going to be a confident-sounding hallucination, which is a uniquely bad outcome for a triage workflow whose purpose is to decide whether to close real bugs.

  ## Expected behavior

  The bundled example should either:

  1. Wire up the tools the prompt actually needs (e.g. a Bugzilla MCP server, `WebFetch` / `WebSearch`, and/or `Bash(hg log ...)` against a mozilla-central checkout passed in via `cwd`), or
  2. Narrow the prompt to questions the agent can answer from the fields that are interpolated (for example "rephrase this bug summary as a clearer triage question" or "classify by keyword"), or
  3. Add a prominent note in the file (and in `bugzilla-retriage.md`) explaining that this is a scaffolding-only example whose verdicts should not be trusted until the user adds tools.

  ## Minimal reproduction

  ```sh
  pnpm tsc
  node dist/examples/bugzilla-retriage.js   # or run the .ts via tsx
  ```

  Observe that every bug produces a verdict with no tool-use messages logged: the agent never reads anything, because it has nothing to read.

  ## Severity

  S3. The example runs without crashing and the library itself behaves as documented, but the example is the user's on-ramp to the Bugzilla generator and as shipped it teaches a workflow that produces confident-sounding but unsupported judgements about real Mozilla bugs.

  ## Possible fix

  The smallest fix is to add an `allowedTools` entry such as `['Read', 'Glob', 'Grep', 'WebFetch', 'WebSearch']` (or whatever the SDK exposes for fetching `{{url}}`) and to mention in `bugzilla-retriage.md` that more tools (Bugzilla MCP, source tree access) are needed for a high-confidence verdict. A larger fix is to ship a small Bugzilla MCP wrapper around `@joewalker/bzjs` and reference it from the example.


  If you discover a problem which prevents you from fixing the bug, comment using the `gh` command.

  When you have finished, commit a fix for the bug including a "Fixes joewalker/loop-the-loop#26" comment and update chat with your progress.

  Finally report on the tools that you would have liked to have used in this investigation, but that you didn't have access to. Give me the exact line to add to `allowedTools` and why it's important.

output: |
  Commit `4c8adc8` is in place. Here is a summary of what I did and what tooling I wished I had.

