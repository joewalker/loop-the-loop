output: |
  Fix committed. Here is a progress summary:

  ## Summary

  The bug was that `ClaudeSDKAgent` was reusing the `allowedTools` config field for two SDK options with very different semantics:

  - The SDK's `allowedTools` is the auto-approval list (bare names and permission patterns)
  - The SDK's `tools` is the load list (bare names, with `[]` meaning "disable everything" and `{ type: 'preset', preset: 'claude_code' }` meaning "load the default set")

  `splitAllowedTools`/`configureQueryOptions` was deriving `tools` from `allowedTools` by extracting bare names, so:

  - `allowedTools: []` was translated to `tools: []`, which the SDK reads as "disable all built-in tools"
  - `allowedTools: ['Bash(gh issue create *)']` was translated to `tools: ['Bash']`, silently dropping Read/Edit/Grep/Glob/WebFetch/MCP tools
  - Omitting `allowedTools` only loaded `['Read', 'Glob', 'Grep']`, hiding the `claude_code` preset

  The fix takes the issue's preferred Option 1:

  1. `allowedTools` is now strictly the auto-approval list and is forwarded unchanged to the SDK
  2. A new `loadedTools` config field maps directly to the SDK's `tools` option (array, `[]` to disable all, or the `claude_code` preset object)
  3. When `loadedTools` is omitted, no `tools` option is sent, so the SDK uses its default `claude_code` preset
  4. JSDoc on both fields now explicitly documents that the load list and the auto-approval list are independent and that `allowedTools: []` does not switch off built-in tools
  5. Schema, README, and the `bugzilla-retriage` example comment are updated to match
  6. The test file is rewritten to cover the new semantics (12 tests pass; previously 6)

  `pnpm tsc`, `pnpm test`, `pnpm lint`, and `pnpm format` all clean.

  ## Missing tools

  For this investigation I would have liked the ability to read inside `node_modules` for type definitions. I used `Grep` and `Read` on `node_modules/@anthropic-ai/claude-agent-sdk/sdk.d.ts` to confirm the exact SDK contract for the `tools` option (the issue quoted the docstring but I wanted to confirm the type signature). That worked, but only because `Read` happens to traverse into `node_modules`. The faster path would have been an LSP `hover` on the imported `Options` symbol or `goToDefinition` from line 4 of `src/agents/claude-sdk.ts` to jump straight into the SDK's `.d.ts`. LSP did not seem to be configured for this workspace (I would have used it instead of grepping). If a TypeScript language server were available, `goToDefinition` on `Options` at `src/agents/claude-sdk.ts:4` and `hover` on the `tools` field would have been the right tools, and they would have been considerably faster than scanning a 3500-line `.d.ts` with `grep`.

  For `allowedTools` itself the only addition I would suggest is:

  ```
  "Bash(pnpm format *)"
  ```

