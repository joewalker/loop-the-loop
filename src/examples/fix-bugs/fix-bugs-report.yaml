  2. `src/util/__test__/load-cli-config.test.ts`: Added a new test `should resolve a relative outputDir against the config file directory` that chdirs to a separate `cwd` directory, supplies `outputDir: 'reports'` and expects `config.outputDir` to be `join(configDir, 'reports')`. The test fails on the unfixed code (TDD red) and passes after the fix (green).

  3. `schema/loop-the-loop.schema.json`: Updated the `outputDir` description to document the relative-path behavior.

  Verification:

  - `pnpm tsc && pnpm test`: 325 passed, 5 skipped (the new test included), nothing failing.
  - `pnpm lint`: 0 warnings, 0 errors.
  - `pnpm format`: clean.

  Tools I would have liked to have had

