status: success
prompt: |
  Please fix bug joewalker/loop-the-loop#32

  Title: loadCliConfig: malformed JSON error swallows the underlying SyntaxError, leaving users with no clue where the syntax error is
  URL: https://github.com/joewalker/loop-the-loop/issues/32
  Labels: bug, S3

  ## Observed behavior

  When the CLI config file contains malformed JSON, `loadCliConfig` throws a generic message that omits the underlying `SyntaxError`:

  ```
  Failed to parse config file: /path/to/config.json
  ```

  The original error from `JSON.parse` (e.g. `Unexpected token } in JSON at position 142`) is discarded.

  Source: [src/util/load-cli-config.ts:74-79](src/util/load-cli-config.ts#L74-L79)

  ```ts
  let config: LoopCliConfig;
  try {
    config = JSON.parse(raw) as LoopCliConfig;
  } catch {
    throw new Error(`Failed to parse config file: ${resolvedPath}`);
  }
  ```

  The catch clause takes no parameter, so the parser's diagnostic (the line/column/token that caused the failure) is dropped on the floor.

  ## Expected behavior

  The error reported to the user should include the underlying parse error so they can find and fix the syntax problem. For example:

  ```
  Failed to parse config file: /path/to/config.json: Unexpected token } in JSON at position 142
  ```

  Either by setting `cause` on the new `Error`, or by interpolating the underlying message into the new message, or both.

  ## Minimal reproduction

  ```sh
  echo '{ not valid json' > /tmp/broken.json
  pnpx loop-the-loop /tmp/broken.json
  # Failed to parse config file: /tmp/broken.json
  # (no indication of *where* the problem is)
  ```

  The existing test `should throw a clear error for malformed JSON` in [src/util/__test__/load-cli-config.test.ts](src/util/__test__/load-cli-config.test.ts) only asserts a substring, so it codifies (and hides) this behavior.

  ## Suggested fix

  ```ts
  try {
    config = JSON.parse(raw) as LoopCliConfig;
  } catch (err) {
    throw new Error(
      `Failed to parse config file: ${resolvedPath}: ${(err as Error).message}`,
      { cause: err },
    );
  }
  ```

  The existing test should then be updated to verify that the new message includes the parser detail (or at least does not regress on the file path).


  If you discover a problem which prevents you from fixing the bug, comment using the `gh` command.

  When you have finished, commit a fix for the bug including a "Fixes #joewalker/loop-the-loop#32" comment and update chat with your progress.

  Finally report on the tools that you would have liked to have used in this investigation, but that you didn't have access to.

output: |
  Fix committed as `96789f5`.

  ## Progress summary

  The bug was that `loadCliConfig` caught `JSON.parse` errors with a parameter-less `catch {}`, so the parser's diagnostic (line, column, offending token) was thrown away and the user just saw `Failed to parse config file: /path/to/config.json` with no clue where the syntax error lived.

  The fix in `src/util/load-cli-config.ts` is the one suggested in the issue: bind the caught error, append its `message` to the user-facing string, and forward it via `{ cause: err }` so programmatic callers can still inspect the original `SyntaxError`:

  ```ts
  } catch (err) {
    const detail = err instanceof Error ? err.message : String(err);
    throw new Error(
      `Failed to parse config file: ${resolvedPath}: ${detail}`,
      { cause: err },
    );
  }
  ```

  The existing test in `src/util/__test__/load-cli-config.test.ts` only checked a substring (and therefore codified the bug). It was tightened to assert that `error.cause instanceof SyntaxError` and that the parser's `message` is interpolated into the outer `Error.message`. Following the Red/Green flow from `AGENTS.md`, the tightened test was confirmed to fail against the old code before the fix landed.

  Verification commands that all pass: `pnpm tsc`, `pnpm test` (325 passed / 5 skipped), `pnpm lint`, `pnpm format`.

  ## Tools I wished I had

  These would have made the investigation lighter, but aren't available to me in this environment:

  `gh issue view joewalker/loop-the-loop#32` and `gh issue comment` access. The task explicitly says to use the `gh` CLI to comment if blocked, but I have no way to confirm the issue text matches what was pasted into the prompt, no way to check whether the issue has prior agent comments to avoid duplication, and no way to verify that the `Fixes #joewalker/loop-the-loop#32` syntax I committed actually triggers GitHub's auto-close behaviour (the canonical syntax for cross-repo references is `Fixes joewalker/loop-the-loop#32` without the leading `#`, but the issue author requested the leading `#`, so I followed the instruction literally).

  A "run command and capture output" variant that reports an exit code without the test runner needing to terminate the process. The vitest run is fine, but for a quick "reproduce the bad message at the CLI" I would have liked to actually invoke `pnpx loop-the-loop /tmp/broken.json` and capture stderr to confirm the new message renders the way users will see it, without falling foul of the sandbox's network/`/tmp` restrictions.

  A diagnostics command tied to the LSP for a single file (`pnpm tsc --noEmit` on just the touched files). `pnpm tsc` rebuilds the whole project graph and is fine here, but a per-file diagnostics surface (similar to what an editor would show after a save) would be more aligned with the `CLAUDE.md` guidance to "check LSP diagnostics" after edits. The `LSP` tool exposes navigation operations but no `diagnostics` operation, so I fell back to running `pnpm tsc`.

  A structured way to inspect the failing test output before applying the fix (so I can show the Red snapshot to the user without leaving stale tests around). The current flow is fine, but a "preview test results" affordance would make TDD more legible in chat.
