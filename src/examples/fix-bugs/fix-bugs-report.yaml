  What changed:

  - Replaced the private heuristic with two top-level exported helpers in `src/agents/claude-sdk.ts`:
    - `classifyResultStatus(subtype, resultMsg, reason)` checks the SDK's structured failure shapes first (`subtype === 'error_max_budget_usd'`, `terminal_reason === 'blocking_limit' | 'rapid_refill_breaker'`) and only falls back to substring matching when no structured signal applies.
