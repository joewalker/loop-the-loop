  - S3 [#7](https://github.com/joewalker/loop-the-loop/issues/7) claude-sdk: success output concatenates every assistant turn instead of using SDK final result. The returned `output` is the join of every text block from every assistant message. The SDK already provides the final answer in `SDKResultSuccess.result`. Inconsistent with `codex-cli` (which captures only the last message).
