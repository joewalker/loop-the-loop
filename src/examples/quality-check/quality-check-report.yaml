  Brief rationale:

  Issue 28 is the most immediate practical problem: a fresh checkout cannot run the example, because `process.loadEnvFile()` with no arguments throws `ENOENT` and no `.env` ships with the repo. I verified this directly with Node 26.

  Issue 29 is the most consequential design problem: the prompt template `'/review {{file}}'` relies on a slash command being processed, but `codex exec` does not parse slash commands at all (the prompt is just a positional argument), and the `@anthropic-ai/claude-agent-sdk` types make it clear that "slash commands are processed" is documented only for the `initialPrompt` field, not for the `prompt` argument to `query()`. The `quality-check` example in the same tree shows the right pattern (a real review prompt loaded via `{{include:...}}`), so this one has a concrete model to copy.

  Issue 30 is a minor scope problem: the exclude list is narrower than the matching `quality-check` example. Without `**/examples/**`, the example reviews itself.

  Issue 31 is a small but real correctness problem with the top-level `await loop(...).catch(console.error)` pattern: the chained `.catch` consumes the rejection, so the outer `await` resolves with `undefined` and the script exits 0 even when the loop failed. I verified the swallowing behaviour with a Node one-liner.

  I deliberately did not file:

  - Anything about the sandbox being read-only for `codex-cli` (already covered by existing issue #12).
  - Anything about default tools in `claude-sdk` (already in flight via #11 and #13).
  - Anything about the lack of `outputDir` or `systemPrompt` in the example. These are stylistic and overlap with issue 29's recommended fix.

  ## Tools I would have wanted but did not have

  Network access during this investigation was restricted to a small allow-list (api.github.com, the npm and MDN sites, a couple of doc hosts). That was usually enough, but I noticed two specific gaps:

  A way to consult the upstream Codex CLI documentation. I had to infer that `codex exec` does not parse slash commands from the loop-the-loop wrapper code in `src/agents/codex-cli.ts` and from the absence of any flag in `buildCommandArgs` that would enable it. Direct access to the Codex CLI docs (or its repository on GitHub via more than just the API, e.g. raw.githubusercontent.com) would have let me cite a definitive source rather than reasoning from the wrapper.

  A reliable JS/TS runtime sandbox. The `Bash` tool worked for `node -e "..."` but only because the global sandbox happened to allow it; if it had not, I would have had to file issue 28 from spec inspection alone. A first-class "run this snippet in Node" capability would tighten the loop on this kind of reproducible behavioural check.

  I had good luck with everything else: LSP for symbol navigation, `gh` for searching and filing issues, `rg`/`Grep` for prose-only searches like the slash-command terminology in `@anthropic-ai/claude-agent-sdk`'s `.d.ts` file, and `Read` for the published SDK types under `node_modules/.pnpm/`.
