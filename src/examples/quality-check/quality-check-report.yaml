  ## Bugs filed

  - S3 — bug — [#5 createAgent throws cryptic error for unknown agent names](https://github.com/joewalker/loop-the-loop/issues/5). `createAgent` in `src/agents.ts` does `agentCreators[name]()` without first checking that the name is registered, so a typo in a JSON config (which `cli.ts` loads with `JSON.parse(...) as LoopCliConfig` and no schema validation) surfaces to the user as `creator is not a function`. Suggested fix is to validate the name up front and throw an `Error` that lists `agentTypes`. I attempted to add the `S3` label via `gh issue edit` but the harness denied permission; the severity is stated explicitly in the issue body.

  ## Other observations (not filed)

  A few things came up while reading `agents.ts` and its neighbours that I deliberately did not file because they are either outside the requested file or sit on the edge of "design decision":

  - `src/loop.ts` declares `mcpServers` on the internal `LoopConfig` and conditionally splats it into `agent.invoke(...)`, but it is never populated from `LoopCliConfig` (which has no `mcpServers` field) and `InvokeOptions` does not declare it either, so the property is dead code. The real `mcpServers` path is the one through `ClaudeSDKAgent.create({ mcpServers })`. Worth a clean-up but not an agents.ts issue.
  - `ClaudeSDKAgent` classifies `error_max_turns` as `status: 'error'`, which causes the loop to bail immediately on first occurrence. The accompanying message tells the user to raise `maxTurns`, which suggests the prompt could succeed on retry; that is closer to a `glitch` than an `error` per the docstrings in `types.ts`. I left this alone because the current behaviour (fail-fast rather than burning more tokens on the same prompt) is defensible.
  - The `as AgentCreator` cast inside `createAgent`'s array branch suppresses argument type checking. With well-typed inputs this is harmless, but JSON-loaded specs (which skip schema validation) can silently pass garbage args that the creator ignores. The fix is the same schema-validation step that would also catch the S3 above.

  ## Tools I would have liked

  - A working LSP `findReferences` for the project. The configured server returned only the definition for `createAgent`, so I had to fall back to `Grep` to find the call sites and confirm the bug is reachable from the CLI path. The project CLAUDE.md asks for LSP-first navigation, but the references query was not delivering results on this codebase during the session.
  - A schema-aware JSON-config validator (or a thin wrapper around `ajv` that the CLI itself called). With one in hand I could have confirmed in one step that the cryptic `creator is not a function` is the user-visible failure mode rather than a friendly schema error. I worked around this by reading `src/util/load-cli-config.ts` and verifying it only does `JSON.parse(...) as LoopCliConfig`.
  - A built-in way to apply GitHub labels without the harness re-prompting per command. `gh issue create --label` worked, but the follow-up `gh issue edit --add-label S3` was rejected so I could not attach the severity label to the filed issue.
