  Now I have enough context to identify the issues. Let me verify the test comment claim once more:
  I've identified clear issues. Let me file them:
  All three issues filed. Here is a summary of the review.

  ## Issues filed

  | # | Severity | Title | Link |
  | --- | --- | --- | --- |
  | 19 | S3 | TestAgent is registered as a CLI-selectable agent but is unusable via the agent-name string form | https://github.com/joewalker/loop-the-loop/issues/19 |
  | 20 | S4 | test-agent: FIFO test comment contradicts the assertions and the implementation | https://github.com/joewalker/loop-the-loop/issues/20 |
  | 21 | S4 | TestAgent.setNextInvokeResult is misleadingly named: variadic, replaces the entire queue | https://github.com/joewalker/loop-the-loop/issues/21 |

  A short rationale:

  Issue 19 (S3) is the only behavioural problem. `TestAgent` is registered in `agentCreators` and the JSON schema's `agentSpec` enum, so a CLI user can write `"agent": "test"` in their config. `createAgent('test')` produces a `TestAgent` with an empty `#results` queue and no public way to populate it, so the loop terminates on the first prompt with a bare `#results is empty` error referencing a private field. The fix is either to drop `"test"` from `agentCreators` and the schema (it is already used directly via `new TestAgent()` in tests) or to extend `TestAgent.create` and the schema to accept a list of canned results.

  Issue 20 (S4) is a documentation bug in `test-agent.test.ts`. The comment "FIFO: second is returned first (pop from end)" contradicts the FIFO test name, the assertions on the following two lines (which correctly verify `first` is returned first), and the implementation in `src/agents/test.ts` (which uses `shift()` to remove from the front). The prompt string arguments are also reversed against the order in which the invokes execute.

  Issue 21 (S4) is an API naming issue. `setNextInvokeResult(...results)` reads as a singular setter but accepts a variadic list and replaces the entire queue. The behaviour is intentional (a dedicated test asserts the replace semantics), but the name is misleading enough that a dedicated test had to be written. Renaming to `setInvokeResults` (and defensively copying the array) would make the contract self-documenting.

  I did not file issues for two smaller observations that I judged below S4:

  - `TestAgent.invoke`'s `options` parameter is declared `_options?: InvokeOptions`, while the `Agent` interface declares `options: InvokeOptions` (required). TypeScript permits this widening and the tests rely on it.
  - `TestAgent.create()` returns `Promise<Agent>` rather than `Promise<TestAgent>`. The narrower return type would matter only once issue 19 is resolved in favour of keeping `TestAgent` registered.

  ## Tools I would have liked to have

  - A `gh issue search` style tool dedicated to checking for duplicate issues. I had to fall back to listing issues with `gh issue list` and reading them visually, which works for a small backlog (around 16 open items here) but would not scale.
  - A working `LSP.hover` and `LSP.documentSymbol` against the test agent file. Both returned "No hover information available" or empty results during this session, so I fell back to reading the files directly via `Read`. The `findReferences` operation did work and was useful for spotting all call sites of `setNextInvokeResult`.
  - A way to compile a one-off TypeScript snippet against the workspace's `tsconfig.json` to confirm structural type questions (for example whether `_options?: InvokeOptions` on an `Agent` implementation actually compiles under `strict: false`). The sandbox blocked the brace-quoted heredoc I tried to use, and there is no `tsc --check-snippet` style helper.
  - A repository-wide search restricted to schema/config files. The text searches I needed (e.g. confirming `"test"` is listed in `agentSpec` in the JSON schema) all worked via `Read`, but a schema-aware navigator (jump from a TS symbol to its JSON Schema definition) would have shortened the loop between code and schema. The `AGENTS.md` file explicitly asks for those to be kept in sync, so this is a recurring pattern.
