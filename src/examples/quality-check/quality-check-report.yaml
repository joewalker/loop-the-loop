  - S3 [#11](https://github.com/joewalker/loop-the-loop/issues/11) claude-sdk: allowedTools doubles as the load list, silently disabling all built-in tools when empty. `splitAllowedTools` derives the SDK `tools` option from the user's `allowedTools` list. The SDK treats `tools: []` as "disable all built-in tools", so passing `allowedTools: []` (a reasonable "no auto-approval" signal) loses every tool. The default-tools fallback also restricts the agent to Read/Glob/Grep with no opt-in to the Claude Code preset.

