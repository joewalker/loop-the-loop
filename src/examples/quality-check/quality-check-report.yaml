  Issue filed. Here's the summary of my investigation.

  ## Bugs found

  S3 - https://github.com/joewalker/loop-the-loop/issues/4 - "VerboseLogger writes to stderr but styleText validates stdout, breaking colors under redirection"

  The `VerboseLogger.#log` method writes through `console.error` (i.e. stderr) but builds its colored payload with the default `styleText(format, text)` call, which validates `process.stdout`. Under common single-stream redirection this produces visible artifacts: colors get stripped when stdout is redirected but stderr is a TTY, and raw ANSI escape codes end up in log files when stderr is redirected but stdout is a TTY. The test in `src/__test__/loggers.test.ts` mirrors the same call so it doesn't catch the inconsistency.

  I deliberately did not file:

  - The variable name `stderrSpy` in the test actually spies on `console.error` rather than `process.stderr`. That is a cosmetic naming nit (the spy is correct, and `console.error` does eventually write to stderr); not worth a separate issue.
  - `createLogger` is exported only via the deep subpath `loop-the-loop/loggers`, not re-exported from `index.ts`. This is a deliberate API-surface choice (matches how `JsonlReporter` / generators are exposed), not a bug.

  ## Tools I would have liked

  - A live Node.js documentation lookup tool for `node:util` (and similar built-in APIs). I had to fall back to grepping `@types/node/util.d.ts` to confirm the `StyleTextOptions` defaults; `nodejs.org` is not in the network allowlist. A docs MCP server for the Node.js API would have been faster and more authoritative.
  - A way to query GitHub issues using full-text search across both open and closed issues with richer filtering (the `gh` CLI worked, but only after I disabled the sandbox - a pre-approved GitHub MCP scoped to read-only issue search would avoid repeated permission prompts and the TLS error I saw under the sandbox).
  - A coverage report viewer integrated with the test results (the project is configured for 100% v8 coverage). It would have helped me see at a glance whether the existing test exercises every branch of `VerboseLogger.#log` and `createLogger`, rather than reading the file and reasoning about it manually.
  - An LSP "find type usages" / "show effective options" tool that would tell me which call sites of `styleText` pass `options` vs. rely on the default. `findReferences` gives location only; resolving argument shape required reading each call site.
