  I've completed my review of `src/examples/bugzilla-retriage.ts` and its sibling files (`bugzilla-retriage.json`, `bugzilla-retriage.md`). Here is what I found.

  ## Issues filed

  | # | Severity | Title | Link |
  |---|---|---|---|
  | 26 | S3 | examples/bugzilla-retriage: agent has no tools to answer the triage questions it is asked | https://github.com/joewalker/loop-the-loop/issues/26 |
  | 27 | S4 | examples/bugzilla-retriage.json: hardcoded 2020-01-01 cutoff contradicts the included "over two years" prompt | https://github.com/joewalker/loop-the-loop/issues/27 |

  The first issue is the substantive one. The example prompts the agent to decide whether old Mozilla bugs should be closed and asks four questions (refactor status, modern Firefox repro, duplicates, deprecated APIs) that simply cannot be answered from the interpolated bug fields. Because no `allowedTools` / `mcpServers` are supplied, `ClaudeSDKAgent` falls back to `['Read', 'Glob', 'Grep']`, which only sees the user's working directory and cannot reach Bugzilla, the web, or mozilla-central. The example as shipped will produce confident-sounding triage verdicts that are unsupported by evidence.

  The second is housekeeping: `.json` filters `creation_ts < 2020-01-01` while the `.md` it includes still says "open for over two years"; the `.ts` sibling correctly recomputes `today - 2 years` at runtime, so the two examples disagree.

  ## Things I considered but did not file

  - `twoYearsAgo.setFullYear(getFullYear() - 2)` has the usual Feb 29 leap-year normalisation edge case (the cutoff slips by one day if the script is run on Feb 29). Pure S4 nit, did not seem worth a tracker entry.
  - The example filters on `creation_ts` ("created over two years ago") but the prompt arguably wants "no activity for over two years" (`last_change_time`). Both are defensible readings of "open for over two years", so I treated it as a design choice rather than a bug.
  - `loop({...}).catch(console.error)` discards the returned summary string, but that pattern matches the other examples (`review.ts`) and is presumably deliberate.
  - The loop `name: 'dom-workers-retriage'` is more specific than the file name `bugzilla-retriage`, so the state file will be `dom-workers-retriage-loop-state.json`. Confusing if you copy the example and swap components, but again it is an example file expected to be edited.

  ## Tools I would have liked but didn't have

  - A way to run the example end-to-end (the sandbox blocks the Bugzilla REST API and the Anthropic API). I had to reason about behaviour from the source rather than confirm by running.
  - The Bugzilla MCP / `WebFetch` / `WebSearch` tools I argue the example is missing - having those locally would have let me empirically demonstrate the hallucination problem rather than argue from the toolset alone.
  - A working `gh` install on the sandbox profile - every `gh` call had to disable sandboxing because of the TLS-trust failure to `api.github.com`. Not a project bug, just friction.
  - A live Firefox / mozilla-central checkout to test whether `Read`/`Glob`/`Grep` would have been even partially useful (they would not, but confirming would have been nice).
  - LSP coverage for the JSON example and the markdown template. LSP did fine on the TypeScript file, but for the cross-file consistency check between `.ts`, `.json` and `.md` I had to fall back to `Read` and human reasoning.
